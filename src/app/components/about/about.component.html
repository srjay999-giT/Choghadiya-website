  <h2>About Choghadiya</h2>
  <p>
    Choghadiya is a traditional Hindu system that divides the day and night into eight equal periods. 
    It is widely used in Gujarat (especially Ahmedabad) to find auspicious and inauspicious timings 
    for starting new work, travel, and other important activities.
  </p>
